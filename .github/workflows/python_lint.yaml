name: Python lint and format

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  run_lints:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: astral-sh/ruff-action@v3
      - run: ruff check
      - run: ruff format --check
